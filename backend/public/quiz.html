<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Student Assignment</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .quiz-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    .quiz-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      color: white;
    }

    .quiz-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .quiz-meta {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .timer {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 0.4rem;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .timer.warning {
      background: rgba(255, 107, 107, 0.3);
    }

    .question-container {
      background: #1a202c;
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 0.8rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .question-number {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .question-text {
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .answer-options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .answer-option {
      background: #0f1419;
      border: 2px solid #667eea;
      border-radius: 0.5rem;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .answer-option:hover {
      background: rgba(102, 126, 234, 0.1);
      border-color: #764ba2;
    }

    .answer-option.selected {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
    }

    .answer-option input[type="radio"],
    .answer-option input[type="checkbox"] {
      cursor: pointer;
      width: 20px;
      height: 20px;
    }

    .answer-text {
      color: white;
      flex: 1;
    }

    .short-answer-input {
      width: 100%;
      padding: 0.75rem;
      background: #0f1419;
      border: 2px solid #667eea;
      border-radius: 0.5rem;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .short-answer-input:focus {
      outline: none;
      border-color: #764ba2;
    }

    .quiz-footer {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .btn-submit {
      background: #28a745;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      background: #218838;
      transform: translateY(-2px);
    }

    .btn-cancel {
      background: #a3aac4;
      color: #0f1419;
      border: none;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-cancel:hover {
      background: #8b92a8;
    }

    .results-container {
      display: none;
    }

    .results-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      color: white;
      text-align: center;
    }

    .score-display {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .score-label {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    .pass-fail {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .pass-fail.pass {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .pass-fail.fail {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .review-section {
      margin-bottom: 2rem;
    }

    .review-title {
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .review-question {
      background: #1a202c;
      border-left: 4px solid #667eea;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .review-question.correct {
      border-left-color: #28a745;
    }

    .review-question.incorrect {
      border-left-color: #dc3545;
    }

    .question-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .status-correct {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .status-incorrect {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .student-answer {
      background: #0f1419;
      padding: 0.75rem;
      border-radius: 0.4rem;
      margin-top: 0.75rem;
      color: #a3aac4;
    }

    .correct-answer {
      background: rgba(40, 167, 69, 0.1);
      border-left: 3px solid #28a745;
      padding: 0.75rem;
      border-radius: 0.4rem;
      margin-top: 0.75rem;
      color: #28a745;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .btn-retake {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-retake:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .btn-return {
      background: #a3aac4;
      color: #0f1419;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-return:hover {
      background: #8b92a8;
    }

    .progress-bar {
      background: rgba(102, 126, 234, 0.1);
      border-radius: 0.5rem;
      height: 8px;
      margin-top: 1rem;
    }

    .progress-fill {
      background: #667eea;
      height: 100%;
      border-radius: 0.5rem;
      transition: width 0.3s ease;
    }

    .attempt-info {
      background: rgba(102, 126, 234, 0.1);
      border-left: 3px solid #667eea;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .attempt-info-text {
      color: #a3aac4;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="layout">
    <main class="main-content" style="background: transparent; min-height: 100vh;">
      <header class="header">
         <h1>Quiz Assignment</h1>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <div id="timerDisplay" class="timer" style="display: none;"></div>
          <div class="user-info">
            <span id="studentName">Student</span>
            <div class="user-avatar" id="studentAvatar">S</div>
          </div>
        </div>
      </header>

      <div class="content">
        <div class="quiz-container">
          <!-- Quiz Interface -->
          <div id="quizInterface">
            <div class="quiz-header">
              <div class="quiz-title" id="quizTitle">Load...</div>
              <div class="quiz-meta">
                <div class="meta-item">
                  <i class="fas fa-questions"></i>
                  <span id="questionCount">0 Questions</span>
                </div>
                <div class="meta-item" id="timeMetaItem" style="display: none;">
                  <i class="fas fa-clock"></i>
                  <span id="timeMeta">Time Limit</span>
                </div>
                <div class="meta-item">
                  <i class="fas fa-check-circle"></i>
                  <span id="passingMeta">70% to Pass</span>
                </div>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
              </div>
            </div>

            <div id="questionsContainer"></div>

            <div class="quiz-footer">
              <button class="btn-submit" onclick="submitQuiz()">
                <i class="fas fa-check"></i> Submit Quiz
              </button>
              <button class="btn-cancel" onclick="cancelQuiz()">
                <i class="fas fa-times"></i> Cancel
              </button>
            </div>
          </div>

          <!-- Results Interface -->
          <div id="resultsInterface" class="results-container">
            <div class="results-header">
              <div class="score-display" id="scoreDisplay">0%</div>
              <div class="score-label">Your Score</div>
              <div class="pass-fail" id="passFailIndicator"></div>
              <div class="attempt-info">
                <div class="attempt-info-text">
                  <i class="fas fa-calendar"></i> Attempt on: <span id="attemptTime"></span>
                </div>
              </div>
            </div>

            <div class="review-section">
              <div class="review-title">Question Review</div>
              <div id="reviewContainer"></div>
            </div>

            <div class="button-group">
              <button class="btn-retake" onclick="retakeQuiz()">
                <i class="fas fa-redo"></i> Retake Quiz
              </button>
              <button class="btn-return" onclick="returnToLesson()">
                <i class="fas fa-arrow-left"></i> Return to Lesson
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script>
    checkAuth('student');

    let currentQuiz = null;
    let userAnswers = {};
    let timerInterval = null;
    let timeRemaining = 0;
    let quizStartTime = null;

    document.getElementById('studentName').textContent = getUserName();
    document.getElementById('studentAvatar').textContent = getUserInitials();

    function loadQuiz() {
      const quizId = new URLSearchParams(window.location.search).get('quizId');
      
      if (!quizId) {
        alert('No quiz specified');
        window.location.href = 'lesson.html';
        return;
      }

      const quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      currentQuiz = quizzes.find(q => q.id === quizId);

      if (!currentQuiz) {
        alert('Quiz not found');
        window.location.href = 'lesson.html';
        return;
      }

      renderQuiz();
      startTimer();
    }

    function renderQuiz() {
      document.getElementById('quizTitle').textContent = currentQuiz.title;
      document.getElementById('questionCount').textContent = currentQuiz.questions.length + ' Questions';
      document.getElementById('passingMeta').textContent = currentQuiz.passingScore + '% to Pass';

      if (currentQuiz.timeLimit > 0) {
        document.getElementById('timeMetaItem').style.display = 'flex';
        document.getElementById('timeMeta').textContent = currentQuiz.timeLimit + ' minutes';
        document.getElementById('timerDisplay').style.display = 'inline-block';
        timeRemaining = currentQuiz.timeLimit * 60;
      }

      const container = document.getElementById('questionsContainer');
      container.innerHTML = currentQuiz.questions.map((q, idx) => {
        return `
          <div class="question-container">
            <div class="question-number">Question ${idx + 1} of ${currentQuiz.questions.length}</div>
            <div class="question-text">${q.question}</div>
            ${renderAnswerOptions(q, idx)}
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${((idx + 1) / currentQuiz.questions.length * 100)}%;"></div>
            </div>
          </div>
        `;
      }).join('');

      userAnswers = {};
      updateProgressBar();
    }

    function renderAnswerOptions(q, qIdx) {
      let html = '<div class="answer-options">';

      if (q.type === 'multiple-choice') {
        html += q.options.map((opt, optIdx) => `
          <label class="answer-option" onchange="recordAnswer(${qIdx}, ${optIdx}); updateProgressBar();">
            <input type="radio" name="q${qIdx}" value="${optIdx}">
            <span class="answer-text">${opt}</span>
          </label>
        `).join('');
      } else if (q.type === 'true-false') {
        html += `
          <label class="answer-option" onchange="recordAnswer(${qIdx}, true); updateProgressBar();">
            <input type="radio" name="q${qIdx}" value="true">
            <span class="answer-text">True</span>
          </label>
          <label class="answer-option" onchange="recordAnswer(${qIdx}, false); updateProgressBar();">
            <input type="radio" name="q${qIdx}" value="false">
            <span class="answer-text">False</span>
          </label>
        `;
      } else if (q.type === 'short-answer') {
        html += `
          <input type="text" class="short-answer-input" id="sa${qIdx}" placeholder="Type your answer..." onchange="recordAnswer(${qIdx}, this.value); updateProgressBar();">
        `;
      } else if (q.type === 'fill-blank') {
        html += `
          <input type="text" class="short-answer-input" id="fb${qIdx}" placeholder="Fill in the blank..." onchange="recordAnswer(${qIdx}, this.value); updateProgressBar();">
        `;
      }

      html += '</div>';
      return html;
    }

    function recordAnswer(qIdx, answer) {
      userAnswers[qIdx] = answer;
    }

    function updateProgressBar() {
      const answered = Object.keys(userAnswers).length;
      const total = currentQuiz.questions.length;
      const percent = (answered / total) * 100;
      document.getElementById('progressFill').style.width = percent + '%';
    }

    function startTimer() {
      if (currentQuiz.timeLimit <= 0) return;

      quizStartTime = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
      timeRemaining = (currentQuiz.timeLimit * 60) - elapsed;

      if (timeRemaining <= 0) {
        clearInterval(timerInterval);
        submitQuiz();
        return;
      }

      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      const display = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      document.getElementById('timerDisplay').textContent = display;

      if (timeRemaining <= 60) {
        document.getElementById('timerDisplay').classList.add('warning');
      }
    }

    function submitQuiz() {
      if (Object.keys(userAnswers).length === 0) {
        alert('Please answer at least one question');
        return;
      }

      clearInterval(timerInterval);
      calculateScore();
    }

    function calculateScore() {
      let correctCount = 0;

      currentQuiz.questions.forEach((q, idx) => {
        const userAnswer = userAnswers[idx];
        let isCorrect = false;

        if (q.type === 'multiple-choice' || q.type === 'true-false') {
          isCorrect = String(userAnswer) === String(q.correctAnswer);
        } else {
          isCorrect = userAnswer && userAnswer.toLowerCase().trim() === (q.correctAnswer || '').toLowerCase().trim();
        }

        if (isCorrect) correctCount++;
      });

      const score = Math.round((correctCount / currentQuiz.questions.length) * 100);
      saveAttempt(score);
      showResults(score);
    }

    function saveAttempt(score) {
      const studentId = localStorage.getItem('userId') || 'guest';
      const studentName = localStorage.getItem('userName') || 'Student';
      const timeSpent = currentQuiz.timeLimit - Math.ceil(timeRemaining / 60);

      if (!currentQuiz.attempts) currentQuiz.attempts = [];

      currentQuiz.attempts.push({
        studentId: studentId,
        studentName: studentName,
        score: score,
        attemptTime: new Date().toISOString(),
        answers: userAnswers,
        timeSpent: timeSpent
      });

      // Update quiz in localStorage
      let quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      const quizIdx = quizzes.findIndex(q => q.id === currentQuiz.id);
      if (quizIdx >= 0) {
        quizzes[quizIdx] = currentQuiz;
        localStorage.setItem('teacherQuizzes', JSON.stringify(quizzes));
      }

      // Update course progress
      updateCourseProgress(score);
    }

    function updateCourseProgress(quizScore) {
      const courseId = currentQuiz.courseId;
      const studentId = localStorage.getItem('userId') || 'guest';

      let enrollments = JSON.parse(localStorage.getItem('studentEnrollments')) || {};
      if (!enrollments[courseId]) enrollments[courseId] = [];

      let studentEnrollment = enrollments[courseId].find(e => e.studentId === studentId);
      if (!studentEnrollment) {
        studentEnrollment = {
          studentId: studentId,
          studentName: localStorage.getItem('userName') || 'Student',
          progress: 0,
          lessonsCompleted: 0,
          videoWatched: 0,
          hoursSpent: 0
        };
        enrollments[courseId].push(studentEnrollment);
      }

      // Increment quiz score and update progress
      studentEnrollment.quizzesCompleted = (studentEnrollment.quizzesCompleted || 0) + 1;
      studentEnrollment.quizScores = (studentEnrollment.quizScores || []);
      studentEnrollment.quizScores.push(quizScore);

      studentEnrollment.progress = Math.min(100, studentEnrollment.progress + 5);

      localStorage.setItem('studentEnrollments', JSON.stringify(enrollments));
    }

    function showResults(score) {
      const isPassed = score >= currentQuiz.passingScore;

      document.getElementById('quizInterface').style.display = 'none';
      document.getElementById('resultsInterface').classList.add('results-container');
      document.getElementById('resultsInterface').style.display = 'block';

      document.getElementById('scoreDisplay').textContent = score + '%';
      document.getElementById('attemptTime').textContent = new Date().toLocaleString();

      const indicator = document.getElementById('passFailIndicator');
      if (isPassed) {
        indicator.textContent = '✓ PASSED';
        indicator.className = 'pass-fail pass';
      } else {
        indicator.textContent = '✗ FAILED';
        indicator.className = 'pass-fail fail';
      }

      renderReview();
    }

    function renderReview() {
      const container = document.getElementById('reviewContainer');

      container.innerHTML = currentQuiz.questions.map((q, idx) => {
        const userAnswer = userAnswers[idx];
        let isCorrect = false;

        if (q.type === 'multiple-choice' || q.type === 'true-false') {
          isCorrect = String(userAnswer) === String(q.correctAnswer);
        } else {
          isCorrect = userAnswer && userAnswer.toLowerCase().trim() === (q.correctAnswer || '').toLowerCase().trim();
        }

        let displayAnswer = userAnswer;
        if (q.type === 'multiple-choice' && typeof userAnswer === 'string') {
          displayAnswer = q.options[parseInt(userAnswer)] || 'Not answered';
        } else if (q.type === 'true-false') {
          displayAnswer = userAnswer === 'true' ? 'True' : (userAnswer === 'false' ? 'False' : 'Not answered');
        }

        let correctDisplay = q.correctAnswer;
        if (q.type === 'multiple-choice' && typeof q.correctAnswer === 'number') {
          correctDisplay = q.options[q.correctAnswer] || 'Unknown';
        } else if (q.type === 'true-false') {
          correctDisplay = q.correctAnswer ? 'True' : 'False';
        }

        return `
          <div class="review-question ${isCorrect ? 'correct' : 'incorrect'}">
            <div class="question-status ${isCorrect ? 'status-correct' : 'status-incorrect'}">
              ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
            </div>
            <div class="question-text">${q.question}</div>
            <div class="student-answer">
              <strong>Your answer:</strong> ${displayAnswer}
            </div>
            ${!isCorrect ? `
              <div class="correct-answer">
                <strong>Correct answer:</strong> ${correctDisplay}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function retakeQuiz() {
      userAnswers = {};
      renderQuiz();
      document.getElementById('quizInterface').style.display = 'block';
      document.getElementById('resultsInterface').style.display = 'none';
      startTimer();
    }

    function cancelQuiz() {
      if (confirm('Cancel this quiz? Your progress will be lost.')) {
        clearInterval(timerInterval);
        window.location.href = 'lesson.html';
      }
    }

    function returnToLesson() {
      window.location.href = 'lesson.html';
    }

    window.addEventListener('load', loadQuiz);
  </script>
</body>
</html>
