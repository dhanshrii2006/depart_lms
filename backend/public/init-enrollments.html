<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initialize Student Enrollments</title>
  <style>
    body {
      background: #0f1419;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .container {
      background: #1a202c;
      border: 1px solid #667eea;
      border-radius: 1rem;
      padding: 2rem;
    }

    h1 {
      color: #667eea;
      margin-bottom: 1rem;
    }

    .status {
      background: #0f1419;
      border-left: 3px solid #667eea;
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem 0;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .success {
      border-left-color: #28a745;
      background: rgba(40, 167, 69, 0.1);
      color: #28a745;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      margin-top: 1rem;
    }

    button:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Student Enrollment Initializer</h1>
    <p>This page initializes mock student enrollment data for testing the My Courses dashboard.</p>
    
    <button onclick="initializeEnrollments()">Initialize Enrollments</button>
    <button onclick="viewData()">View Data</button>
    <button onclick="clearData()">Clear Data</button>

    <div id="output"></div>
  </div>

  <script>
    function initializeEnrollments() {
      const output = document.getElementById('output');
      
      try {
        // Get all courses from teacherCourses
        const courses = JSON.parse(localStorage.getItem('teacherCourses')) || [];
        
        if (courses.length === 0) {
          output.innerHTML = '<div class="status">No courses found. Please create courses first in the Course Creation page.</div>';
          return;
        }

        const enrollments = {};
        const mockStudents = [
          { id: 'S001', name: 'Alice Johnson' },
          { id: 'S002', name: 'Bob Smith' },
          { id: 'S003', name: 'Carol White' },
          { id: 'S004', name: 'David Brown' },
          { id: 'S005', name: 'Emma Davis' }
        ];

        // Create enrollments for each course
        courses.forEach((course, idx) => {
          enrollments[course.id] = [];
          
          // Enroll 2-5 random students per course
          const numStudents = Math.floor(Math.random() * 4) + 2;
          const selectedStudents = mockStudents.sort(() => Math.random() - 0.5).slice(0, numStudents);
          
          selectedStudents.forEach(student => {
            enrollments[course.id].push({
              studentId: student.id,
              studentName: student.name,
              progress: Math.floor(Math.random() * 100),
              lessonsCompleted: Math.floor(Math.random() * (course.modules.length + 1)),
              videoWatched: Math.floor(Math.random() * 15),
              hoursSpent: Math.round(Math.random() * 50 * 10) / 10
            });
          });
        });

        localStorage.setItem('studentEnrollments', JSON.stringify(enrollments));
        
        let html = '<div class="status success">✓ Enrollments initialized successfully!\n\n';
        html += `Courses: ${courses.length}\n`;
        html += `Total student-course enrollments: ${Object.values(enrollments).flat().length}\n\n`;
        
        courses.forEach((course, idx) => {
          const enrolled = enrollments[course.id];
          html += `📚 ${course.title}: ${enrolled.length} students enrolled\n`;
        });
        
        html += '\nData saved to localStorage["studentEnrollments"]\n';
        html += 'Redirecting to My Courses in 3 seconds...</div>';
        
        output.innerHTML = html;
        
        setTimeout(() => {
          window.location.href = 'my-courses.html';
        }, 3000);
      } catch (error) {
        output.innerHTML = `<div class="status">Error: ${error.message}</div>`;
      }
    }

    function viewData() {
      const output = document.getElementById('output');
      try {
        const enrollments = JSON.parse(localStorage.getItem('studentEnrollments')) || {};
        output.innerHTML = `<div class="status success">${JSON.stringify(enrollments, null, 2)}</div>`;
      } catch (error) {
        output.innerHTML = `<div class="status">Error: ${error.message}</div>`;
      }
    }

    function clearData() {
      localStorage.removeItem('studentEnrollments');
      document.getElementById('output').innerHTML = '<div class="status success">✓ Enrollment data cleared</div>';
    }
  </script>
</body>
</html>
