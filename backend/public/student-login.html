<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - Acadify</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .login-container {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-content {
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      color: #667eea;
      margin: 0 0 10px;
    }

    .header p {
      color: #666;
      margin: 0;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s;
      font-family: inherit;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    input.error {
      border-color: #f56565;
    }

    .error-message {
      color: #f56565;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .links a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .login-container {
        padding: 30px 20px;
        min-height: auto;
        margin-top: 20px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .submit-btn {
        padding: 10px;
        font-size: 0.95rem;
      }

      .links {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-content">
      <div class="header">
        <h1>Sign In</h1>
        <p>Student Login for Acadify LMS</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">College Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your.email@stvincentngp.edu.in"
            required
          >
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required
          >
          <div class="error-message" id="passwordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In
        </button>
      </form>

      <div class="links">
        <a href="/student-signup.html">Create Account</a>
        <a href="/forgot-password.html">Forgot Password?</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');

    const COLLEGE_DOMAIN = '@stvincentngp.edu.in';

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous errors
      ['emailError', 'passwordError'].forEach(id => {
        document.getElementById(id).classList.remove('show');
      });

      // Get values
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      let isValid = true;

      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        document.getElementById('emailError').classList.add('show');
        isValid = false;
      } else if (!email.endsWith(COLLEGE_DOMAIN)) {
        document.getElementById('emailError').textContent = `Must use ${COLLEGE_DOMAIN}`;
        document.getElementById('emailError').classList.add('show');
        isValid = false;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        document.getElementById('passwordError').classList.add('show');
        isValid = false;
      }

      if (!isValid) return;

      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        // Call login endpoint
        const response = await fetch('/api/auth/student-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // ✅ Store token and user info
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('userRole', data.user.role);
          localStorage.setItem('userEmail', data.user.email);
          localStorage.setItem('userUID', data.user.uid);
          localStorage.setItem('userName', data.user.name);
        }

        // ✅ Redirect to dashboard
        console.log('✅ Login successful, redirecting...');
        window.location.href = '/student-dashboard.html';

      } catch (error) {
        console.error('Login error:', error);
        const errorMsg = error.message;
        
        // Show generic error for security
        document.getElementById('passwordError').textContent = 'Invalid email or password';
        document.getElementById('passwordError').classList.add('show');

        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
