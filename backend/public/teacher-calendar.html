<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - Acadify Teacher</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .calendar-wrapper {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .calendar-main {
      background: #1a202c;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid #667eea;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .calendar-header h2 {
      color: white;
      font-size: 1.5rem;
      margin: 0;
    }

    .calendar-nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .calendar-nav button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .calendar-nav button:hover {
      background: #5568d3;
    }

    .current-month {
      color: white;
      font-weight: 600;
      min-width: 150px;
      text-align: center;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }

    .day-header {
      text-align: center;
      font-weight: 600;
      color: #a3aac4;
      padding: 1rem 0.5rem;
      font-size: 0.9rem;
    }

    .calendar-day {
      aspect-ratio: 1;
      border: 1px solid #667eea;
      border-radius: 0.5rem;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      color: white;
      background: #0f1419;
      transition: all 0.3s;
    }

    .calendar-day:hover {
      background: #667eea;
      border-color: #764ba2;
    }

    .calendar-day.today {
      background: #667eea;
      border-color: #764ba2;
      font-weight: 600;
    }

    .calendar-day.other-month {
      color: #667eea;
      opacity: 0.4;
    }

    .day-number {
      font-weight: 600;
    }

    .sidebar-calendar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-card {
      background: #1a202c;
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid #667eea;
    }

    .sidebar-card h3 {
      color: white;
      font-size: 1.1rem;
      margin: 0 0 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .event-item {
      padding: 1rem;
      background: #0f1419;
      border-left: 3px solid #667eea;
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      color: white;
    }

    .event-time {
      font-size: 0.8rem;
      color: #a3aac4;
      margin-bottom: 0.25rem;
    }

    .event-title {
      font-weight: 600;
      color: white;
      margin: 0.25rem 0;
    }

    .add-event-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }

    .add-event-btn:hover {
      background: #5568d3;
    }

    .event-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .event-modal.active {
      display: flex;
    }

    .event-modal-content {
      background: #1a202c;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      border: 1px solid #667eea;
    }

    .event-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      color: white;
    }

    .event-modal-header h2 {
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #a3aac4;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      color: white;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #667eea;
      border-radius: 0.5rem;
      background: #0f1419;
      color: white;
      font-family: inherit;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #764ba2;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-actions button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .save-btn {
      background: #667eea;
      color: white;
    }

    .save-btn:hover {
      background: #5568d3;
    }

    .cancel-btn {
      background: #764ba2;
      color: white;
    }

    .cancel-btn:hover {
      background: #6a4194;
    }

    @media (max-width: 768px) {
      .calendar-wrapper {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="teacher-dashboard.html"><i class="fas fa-home mr-2"></i> Dashboard</a></li>
        <li><a href="course-creation.html"><i class="fas fa-plus-circle mr-2"></i> Create Course</a></li>
        <li><a href="teacher-my-courses.html"><i class="fas fa-book mr-2"></i> My Courses</a></li>
        <li><a href="assignment-management.html"><i class="fas fa-tasks mr-2"></i> Assignments</a></li>
        <li><a href="teacher-calendar.html" class="active"><i class="fas fa-calendar mr-2"></i> Calendar</a></li>
        <li><a href="teacher-settings.html"><i class="fas fa-cog mr-2"></i> Settings</a></li>
        <li class="mt-4"><a href="#" onclick="logout(); return false;"><i class="fas fa-power-off mr-2"></i> Exit</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>Academic Calendar</h1>
        <div class="user-info">
          <span id="userName"></span>
          <div class="user-avatar" id="userAvatar">T</div>
        </div>
      </header>

      <div class="calendar-wrapper">
        <div class="calendar-main">
          <div class="calendar-header">
            <h2>Schedule Overview</h2>
            <div class="calendar-nav">
              <button onclick="previousMonth()" title="Previous">◀</button>
              <span class="current-month" id="currentMonth"></span>
              <button onclick="nextMonth()" title="Next">▶</button>
              <button onclick="goToToday()">Today</button>
            </div>
          </div>

          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="sidebar-calendar">
          <div class="sidebar-card">
            <h3><i class="fas fa-plus-circle"></i> Add Event</h3>
            <button class="add-event-btn" onclick="openEventModal()">+ New Event</button>
          </div>

          <div class="sidebar-card">
            <h3><i class="fas fa-tasks"></i> Upcoming</h3>
            <div id="upcomingEvents"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Event Modal -->
  <div class="event-modal" id="eventModal">
    <div class="event-modal-content">
      <div class="event-modal-header">
        <h2>Add Event</h2>
        <button class="close-btn" onclick="closeEventModal()">&times;</button>
      </div>

      <form id="eventForm" onsubmit="saveEvent(event)">
        <div class="form-group">
          <label class="form-label">Event Title *</label>
          <input type="text" class="form-input" id="eventTitle" placeholder="e.g., Assignment Deadline" required>
        </div>

        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" class="form-input" id="eventDate" required>
        </div>

        <div class="form-group">
          <label class="form-label">Time</label>
          <input type="time" class="form-input" id="eventTime">
        </div>

        <div class="form-group">
          <label class="form-label">Event Type</label>
          <select class="form-select" id="eventType">
            <option value="deadline">Assignment Deadline</option>
            <option value="exam">Exam/Quiz</option>
            <option value="class">Class Session</option>
            <option value="meeting">Meeting</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="submit" class="save-btn">Save Event</button>
          <button type="button" class="cancel-btn" onclick="closeEventModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    checkAuth('teacher');

    let currentDate = new Date();
    let events = [];

    document.getElementById('userName').textContent = getUserName();
    document.getElementById('userAvatar').textContent = getUserInitials();

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay();

      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
      
      document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;

      const calendarGrid = document.getElementById('calendarGrid');
      calendarGrid.innerHTML = '';

      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      dayNames.forEach(day => {
        const header = document.createElement('div');
        header.className = 'day-header';
        header.textContent = day;
        calendarGrid.appendChild(header);
      });

      for (let i = 0; i < startingDayOfWeek; i++) {
        const emptyDay = document.createElement('div');
        emptyDay.className = 'calendar-day other-month';
        calendarGrid.appendChild(emptyDay);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        
        const today = new Date();
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          dayEl.classList.add('today');
        }

        dayEl.innerHTML = `<span class="day-number">${day}</span>`;
        dayEl.onclick = () => selectDate(year, month, day);
        calendarGrid.appendChild(dayEl);
      }
    }

    function selectDate(year, month, day) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      document.getElementById('eventDate').value = dateStr;
      openEventModal();
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function goToToday() {
      currentDate = new Date();
      renderCalendar();
      loadUpcomingEvents();
    }

    function openEventModal() {
      document.getElementById('eventModal').classList.add('active');
      if (!document.getElementById('eventDate').value) {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('eventDate').value = today;
      }
    }

    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('active');
      document.getElementById('eventForm').reset();
    }

    function saveEvent(e) {
      e.preventDefault();
      const event = {
        id: Date.now(),
        title: document.getElementById('eventTitle').value,
        date: document.getElementById('eventDate').value,
        time: document.getElementById('eventTime').value,
        type: document.getElementById('eventType').value
      };

      events.push(event);
      localStorage.setItem('teacherEvents', JSON.stringify(events));
      
      renderCalendar();
      loadUpcomingEvents();
      closeEventModal();
      alert('✓ Event added successfully!');
    }

    function loadUpcomingEvents() {
      const upcomingContainer = document.getElementById('upcomingEvents');
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const upcoming = events
        .filter(e => new Date(e.date) >= today)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(0, 5);

      if (upcoming.length === 0) {
        upcomingContainer.innerHTML = '<p style="color: #a3aac4; text-align: center; padding: 1rem;">No upcoming events</p>';
        return;
      }

      upcomingContainer.innerHTML = upcoming.map(event => `
        <div class="event-item">
          <div class="event-time">${new Date(event.date).toLocaleDateString()}</div>
          <div class="event-title">${event.title}</div>
        </div>
      `).join('');
    }

    // Initialize
    const savedEvents = localStorage.getItem('teacherEvents');
    if (savedEvents) events = JSON.parse(savedEvents);
    renderCalendar();
    loadUpcomingEvents();

    // Close modal when clicking outside
    document.getElementById('eventModal').onclick = (e) => {
      if (e.target.id === 'eventModal') closeEventModal();
    };
  </script>
</body>
</html>
