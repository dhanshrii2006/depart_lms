<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Signup - Acadify</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .signup-container {
      max-width: 450px;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .signup-content {
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      color: #667eea;
      margin: 0 0 10px;
    }

    .header p {
      color: #666;
      margin: 0;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s;
      font-family: inherit;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    input.error {
      border-color: #f56565;
    }

    .error-message {
      color: #f56565;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .help-text {
      color: #999;
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .domain-info {
      color: #667eea;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .signup-container {
        padding: 30px 20px;
        min-height: auto;
        margin-top: 20px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .submit-btn {
        padding: 10px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-content">
      <div class="header">
        <h1>Create Account</h1>
        <p>Student Signup for Acadify LMS</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Enter your full name"
            required
          >
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">College Email *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your.email@stvincentngp.edu.in"
            required
          >
          <div class="error-message" id="emailError"></div>
          <div class="domain-info" id="domainInfo">
            ✓ Must use college domain: @stvincentngp.edu.in
          </div>
        </div>

        <div class="form-group">
          <label for="uid">Username (UID) *</label>
          <input 
            type="text" 
            id="uid" 
            name="uid" 
            placeholder="Create a unique username (e.g., johndoe-001)"
            required
          >
          <div class="error-message" id="uidError"></div>
          <div class="help-text">
            Letters, numbers, dash, and underscore only
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Min 8 characters"
            required
          >
          <div class="error-message" id="passwordError"></div>
          <div class="help-text">
            At least 8 characters for security
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="Confirm your password"
            required
          >
          <div class="error-message" id="confirmError"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign Up
        </button>
      </form>

      <div class="login-link">
        Already have an account? <a href="/student-login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const uidInput = document.getElementById('uid');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');

    // College domain constant
    const COLLEGE_DOMAIN = '@stvincentngp.edu.in';

    // ✅ Validate name on blur
    nameInput.addEventListener('blur', () => {
      const name = nameInput.value.trim();
      if (name && name.length < 2) {
        nameInput.classList.add('error');
        document.getElementById('nameError').textContent = 'Name must be at least 2 characters';
        document.getElementById('nameError').classList.add('show');
      } else {
        nameInput.classList.remove('error');
        document.getElementById('nameError').classList.remove('show');
      }
    });

    // ✅ Show domain info when email is focused
    emailInput.addEventListener('focus', () => {
      document.getElementById('domainInfo').style.display = 'block';
    });

    // ✅ Validate college domain on email change
    emailInput.addEventListener('blur', () => {
      const email = emailInput.value.trim();
      if (email && !email.endsWith(COLLEGE_DOMAIN)) {
        emailInput.classList.add('error');
        document.getElementById('emailError').textContent = `Please use college domain ${COLLEGE_DOMAIN}`;
        document.getElementById('emailError').classList.add('show');
      } else {
        emailInput.classList.remove('error');
        document.getElementById('emailError').classList.remove('show');
        document.getElementById('domainInfo').style.display = 'block';
      }
    });

    // ✅ Validate UID format
    uidInput.addEventListener('blur', () => {
      const uid = uidInput.value.trim();
      if (uid && !/^[a-zA-Z0-9_-]+$/.test(uid)) {
        uidInput.classList.add('error');
        document.getElementById('uidError').textContent = 'Use only letters, numbers, dash, or underscore';
        document.getElementById('uidError').classList.add('show');
      } else {
        uidInput.classList.remove('error');
        document.getElementById('uidError').classList.remove('show');
      }
    });

    // ✅ Validate password match
    confirmInput.addEventListener('blur', () => {
      if (passwordInput.value && confirmInput.value && passwordInput.value !== confirmInput.value) {
        confirmInput.classList.add('error');
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        document.getElementById('confirmError').classList.add('show');
      } else {
        confirmInput.classList.remove('error');
        document.getElementById('confirmError').classList.remove('show');
      }
    });

    // ✅ Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous errors
      ['nameError', 'emailError', 'uidError', 'passwordError', 'confirmError'].forEach(id => {
        document.getElementById(id).classList.remove('show');
      });

      // Get values
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const uid = uidInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      // Validation
      let isValid = true;

      if (!name || name.length < 2) {
        document.getElementById('nameError').textContent = 'Please enter a valid name (at least 2 characters)';
        document.getElementById('nameError').classList.add('show');
        isValid = false;
      }

      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        document.getElementById('emailError').classList.add('show');
        isValid = false;
      } else if (!email.endsWith(COLLEGE_DOMAIN)) {
        document.getElementById('emailError').textContent = `Must use ${COLLEGE_DOMAIN}`;
        document.getElementById('emailError').classList.add('show');
        isValid = false;
      }

      if (!uid) {
        document.getElementById('uidError').textContent = 'Username is required';
        document.getElementById('uidError').classList.add('show');
        isValid = false;
      } else if (!/^[a-zA-Z0-9_-]+$/.test(uid)) {
        document.getElementById('uidError').textContent = 'Invalid characters in username';
        document.getElementById('uidError').classList.add('show');
        isValid = false;
      }

      if (!password || password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordError').classList.add('show');
        isValid = false;
      }

      if (password !== confirmPassword) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        document.getElementById('confirmError').classList.add('show');
        isValid = false;
      }

      if (!isValid) return;

      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        // Call signup endpoint
        const response = await fetch('/api/auth/student-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, uid, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Signup failed');
        }

        // ✅ Store token
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('userRole', data.user.role);
          localStorage.setItem('userEmail', data.user.email);
          localStorage.setItem('userUID', data.user.uid);
          localStorage.setItem('userName', data.user.name);
        }

        // âœ… Auto-redirect to login page
        console.log('✅ Account created! Redirecting to login...');
        window.location.href = '/student-login.html';

      } catch (error) {
        console.error('Signup error:', error);
        const errorMsg = error.message;
        
        // Show error at top
        if (errorMsg.includes('email')) {
          document.getElementById('emailError').textContent = errorMsg;
          document.getElementById('emailError').classList.add('show');
        } else if (errorMsg.includes('UID') || errorMsg.includes('username')) {
          document.getElementById('uidError').textContent = errorMsg;
          document.getElementById('uidError').classList.add('show');
        } else {
          alert('Signup failed: ' + errorMsg);
        }

        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    });
  </script>
</body>
</html>
