<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments - Acadify</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="teacher.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📚 Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="../teacher-dashboard.html">Dashboard</a></li>
        <li><a href="../my-courses.html">My Courses</a></li>
        <li><a href="students.html">Students</a></li>
        <li><a href="assignments.html" class="active">Assignments</a></li>
        <li><a href="grades.html">Grades</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="../settings.html">Settings</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          <span style="font-weight:600; color:#667eea;">Assignments</span>
        </div>
        <div class="topbar-right">
          <div class="profile">
            <div class="profile-avatar" id="userInitials">TC</div>
            <span id="userName">Teacher</span>
          </div>
        </div>
      </div>
      <div class="page-container">
        <div class="card">
          <h1>Assignments</h1>
          <div id="content">
            <p style="color: #999;">Loading assignments...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../auth.js"></script>
  <script src="../api.js"></script>
  <script>
    checkAuth('teacher');
    
    var userName = localStorage.getItem('userName') || 'Teacher';
    var userInitials = localStorage.getItem('userInitials') || 'TC';
    document.getElementById('userName').textContent = userName;
    document.getElementById('userInitials').textContent = userInitials;
  </script>
</body>
</html>
