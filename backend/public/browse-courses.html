<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Courses | Acadify</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="student-dashboard.html"><i class="fas fa-th-large mr-2"></i> Dashboard</a></li>
        <li><a href="my-courses.html"><i class="fas fa-book mr-2"></i> My Library</a></li>
        <li><a href="browse-courses.html" class="active"><i class="fas fa-search mr-2"></i> Explore</a></li>
        <li><a href="progress.html"><i class="fas fa-chart-line mr-2"></i> Analytics</a></li>
        <li><a href="settings.html"><i class="fas fa-cog mr-2"></i> Settings</a></li>
        <li class="mt-4"><a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt mr-2"></i> Exit</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>Explore</h1>
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">S</div>
          <span id="userName" class="text-small font-weight-600">Student</span>
        </div>
      </header>

      <div class="welcome-banner">
        <h2>Global Curriculum</h2>
        <p class="opacity-60">Handpicked courses from industry experts. Use your institution's invite code to unlock premium modules.</p>
      </div>

      <div class="mb-4">
        <div class="flex-row justify-between mb-3">
          <h3>Available Modules</h3>
          <div class="flex-row gap-2">
            <span class="label-sm text-muted">Filter by Status:</span>
            <select class="text-small" style="background: var(--surface-high); border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; color: var(--on-surface);">
              <option>All Categories</option>
              <option>Advanced Programming</option>
              <option>Web Systems</option>
            </select>
          </div>
        </div>
        
        <div id="coursesGrid" class="grid grid-3">
          <!-- Courses injected here -->
        </div>
      </div>
    </main>
  </div>

  <style>
    .mr-2 { margin-right: 0.5rem; }
    .font-weight-600 { font-weight: 600; }
    .flex-row { display: flex; align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 1rem; }
    .btn-block { width: 100%; display: block; }
    
    .course-card .course-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    
    .course-card .rating {
      color: var(--tertiary);
      font-weight: 600;
    }
  </style>

  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>
    checkAuth('student');

    document.getElementById('userName').textContent = getUserName();
    document.getElementById('userAvatar').textContent = getUserInitials();

    var mockCourses = [
      { id: 1, title: 'React Architecture Patterns', teacher_name: 'Sarah Johnson', rating: '4.8', students: '2.3k', category: 'Advanced Programming' },
      { id: 2, title: 'Node.js Systems Design', teacher_name: 'Alex Rodriguez', rating: '4.7', students: '1.8k', category: 'Web Systems' },
      { id: 3, title: 'Applied Data Science', teacher_name: 'Lisa Zhang', rating: '4.9', students: '5.1k', category: 'Analytics' },
      { id: 4, title: 'TypeScript for Scale', teacher_name: 'David Martinez', rating: '4.6', students: '1.2k', category: 'Frontend' },
      { id: 5, title: 'Cloud Infrastructure', teacher_name: 'Nathan Brown', rating: '4.8', students: '3.4k', category: 'DevOps' },
      { id: 6, title: 'Design Systems Theory', teacher_name: 'Emma Wilson', rating: '4.9', students: '2.7k', category: 'Design' }
    ];

    function renderCourses(courses) {
      var grid = document.getElementById('coursesGrid');
      grid.innerHTML = '';
      for (var i = 0; i < courses.length; i++) {
        var course = courses[i];
        var card = document.createElement('div');
        card.className = 'card course-card';
        card.innerHTML = `
          <div class="course-image"></div>
          <div>
            <span class="label-sm text-muted">${course.category}</span>
            <h4 class="mt-1 mb-1">${course.title}</h4>
            <p class="text-small opacity-60 mb-2">by ${course.teacher_name}</p>
            <div class="course-meta">
              <span class="rating"><i class="fas fa-star mr-1"></i> ${course.rating}</span>
              <span><i class="fas fa-user-graduate mr-1"></i> ${course.students} Learners</span>
            </div>
            <button class="btn btn-primary btn-block mt-3" onclick="enrollCourse('${course.title}')">
              Join Cohort
            </button>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    async function enrollCourse(courseTitle) {
       const code = prompt('Enter enrollment key for: ' + courseTitle);
       if (!code) return;
       
       try {
           const response = await enrollmentsAPI.join(code);
           if (response.error) {
               alert('Error: ' + response.error);
               return;
           }
           alert('Successfully enrolled in ' + courseTitle + '!');
           // Refresh courses list
           loadCourses();
       } catch (error) {
           console.error('Error:', error);
           if (error.message.includes('Invalid invite code')) {
               alert('Invalid enrollment key. Please check the key and try again.');
           } else if (error.message.includes('already')) {
               alert('You are already enrolled in this course.');
           } else {
               alert('Error enrolling in course: ' + error.message);
           }
       }
    }

    renderCourses(mockCourses);

    // Enroll by invite code
    async function enrollByInviteCode() {
      const code = document.getElementById('inviteCodeInput').value.trim();
      const messageDiv = document.getElementById('enrollmentMessage');

      if (!code) {
        messageDiv.textContent = '❌ Please enter an invite code';
        messageDiv.style.color = '#ff6b6b';
        return;
      }

      try {
        const response = await fetch('/api/enrollments/join', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ invite_code: code })
        });

        const data = await response.json();

        if (!response.ok) {
          messageDiv.textContent = '❌ ' + (data.error || 'Failed to enroll');
          messageDiv.style.color = '#ff6b6b';
          return;
        }

        messageDiv.textContent = '✅ Successfully joined! Redirecting...';
        messageDiv.style.color = '#51cf66';
        document.getElementById('inviteCodeInput').value = '';

        // Redirect to student dashboard after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'student-dashboard.html';
        }, 1500);
      } catch (error) {
        messageDiv.textContent = '❌ Error: ' + error.message;
        messageDiv.style.color = '#ff6b6b';
      }
    }

    // Allow Enter key to submit
    document.getElementById('inviteCodeInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') enrollByInviteCode();
    });
  </script>
</body>
</html>
