<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Management - Acadify Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar-logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-menu li {
      margin-bottom: 10px;
    }

    .sidebar-menu a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      border-radius: 6px;
      display: block;
      transition: background 0.3s;
    }

    .sidebar-menu a:hover,
    .sidebar-menu a.active {
      background: #667eea;
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      margin: 0;
      color: #2c3e50;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #f56565;
      color: white;
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    .btn-danger:hover {
      background: #e53e3e;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 15px;
    }

    .modal-header h2 {
      margin: 0;
      color: #2c3e50;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .error-message {
      color: #f56565;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .help-text {
      color: #999;
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .teachers-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .teachers-header {
      padding: 20px;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .teachers-header h2 {
      margin: 0;
      color: #2c3e50;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f9f9f9;
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #2c3e50;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    tbody tr:hover {
      background: #f9f9f9;
    }

    .teacher-actions {
      display: flex;
      gap: 10px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.85rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-edit {
      background: #667eea;
      color: white;
    }

    .btn-edit:hover {
      background: #5568d3;
    }

    .btn-delete {
      background: #f56565;
      color: white;
    }

    .btn-delete:hover {
      background: #e53e3e;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge-success {
      background: #c6f6d5;
      color: #22543d;
    }

    .badge-warning {
      background: #fef5e7;
      color: #7d6608;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state h3 {
      margin: 0 0 10px;
      color: #666;
    }

    .success-message {
      background: #c6f6d5;
      color: #22543d;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main-content {
        padding: 15px;
      }

      table {
        font-size: 0.9rem;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📚 Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="admin-dashboard.html">Dashboard</a></li>
        <li><a href="teacher-management.html" class="active">Teachers</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>Teacher Management</h1>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openCreateModal()">+ Add New Teacher</button>
        </div>
      </div>

      <div id="successMessage" class="success-message"></div>

      <div class="teachers-container">
        <div class="teachers-header">
          <h2>All Teachers</h2>
          <span id="teacherCount">0 teachers</span>
        </div>
        <div id="teachersTable"></div>
      </div>
    </main>
  </div>

  <!-- Create/Edit Teacher Modal -->
  <div id="teacherModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Create New Teacher</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>

      <form id="teacherForm">
        <div class="form-group">
          <label for="uid">Username (UID) *</label>
          <input 
            type="text" 
            id="uid" 
            name="uid" 
            placeholder="e.g., john.smith"
            required
          >
          <div class="error-message" id="uidError"></div>
          <div class="help-text">Letters, numbers, dash, underscore only</div>
        </div>

        <div class="form-group">
          <label for="name">Full Name *</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="e.g., John Smith"
            required
          >
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="e.g., john.smith@email.com"
            required
          >
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Min 8 characters"
            required
          >
          <div class="error-message" id="passwordError"></div>
          <div class="help-text" id="passwordHint">At least 8 characters</div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
          Create Teacher
        </button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>
    checkAuth('admin');

    let teachers = [];
    let editingTeacherId = null;

    // Load teachers on page load
    document.addEventListener('DOMContentLoaded', loadTeachers);

    // Form submission
    document.getElementById('teacherForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const uid = document.getElementById('uid').value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear errors
      ['uidError', 'nameError', 'emailError', 'passwordError'].forEach(id => {
        document.getElementById(id).classList.remove('show');
      });

      // Validation
      let isValid = true;

      if (!uid || !/^[a-zA-Z0-9_-]+$/.test(uid)) {
        document.getElementById('uidError').textContent = 'Valid UID required (letters, numbers, dash, underscore)';
        document.getElementById('uidError').classList.add('show');
        isValid = false;
      }

      if (!name || name.length < 2) {
        document.getElementById('nameError').textContent = 'Name must be at least 2 characters';
        document.getElementById('nameError').classList.add('show');
        isValid = false;
      }

      if (!email || !email.includes('@')) {
        document.getElementById('emailError').textContent = 'Valid email required';
        document.getElementById('emailError').classList.add('show');
        isValid = false;
      }

      if (!password || password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordError').classList.add('show');
        isValid = false;
      }

      if (!isValid) return;

      try {
        const response = await fetch('/api/teachers/create', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ uid, name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to create teacher');
        }

        showSuccess('Teacher created successfully!');
        closeModal();
        loadTeachers();

      } catch (error) {
        console.error('Create error:', error);
        alert('Error: ' + error.message);
      }
    });

    async function loadTeachers() {
      try {
        const response = await fetch('/api/teachers', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });

        const data = await response.json();
        teachers = data.teachers || [];

        renderTeachersTable();
      } catch (error) {
        console.error('Load error:', error);
        showEmptyState();
      }
    }

    function renderTeachersTable() {
      const container = document.getElementById('teachersTable');
      document.getElementById('teacherCount').textContent = teachers.length + ' ' + (teachers.length === 1 ? 'teacher' : 'teachers');

      if (teachers.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No teachers yet</h3>
            <p>Click "Add New Teacher" to create one</p>
          </div>
        `;
        return;
      }

      const html = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>UID (Username)</th>
              <th>Email</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${teachers.map(teacher => `
              <tr>
                <td>${teacher.name}</td>
                <td><strong>${teacher.roll_number}</strong></td>
                <td>${teacher.email}</td>
                <td><span class="badge badge-success">Active</span></td>
                <td>${new Date(teacher.created_at).toLocaleDateString()}</td>
                <td>
                  <div class="teacher-actions">
                    <button class="btn-sm btn-delete" onclick="deleteTeacher('${teacher.id}')">Delete</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      container.innerHTML = html;
    }

    async function deleteTeacher(teacherId) {
      if (!confirm('Are you sure you want to delete this teacher?')) return;

      try {
        const response = await fetch(`/api/teachers/${teacherId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });

        if (!response.ok) {
          throw new Error('Failed to delete teacher');
        }

        showSuccess('Teacher deleted successfully!');
        loadTeachers();

      } catch (error) {
        console.error('Delete error:', error);
        alert('Error: ' + error.message);
      }
    }

    function openCreateModal() {
      editingTeacherId = null;
      document.getElementById('modalTitle').textContent = 'Create New Teacher';
      document.getElementById('teacherForm').reset();
      document.getElementById('password').required = true;
      document.getElementById('teacherModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('teacherModal').classList.remove('active');
      editingTeacherId = null;
    }

    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    function showEmptyState() {
      document.getElementById('teachersTable').innerHTML = `
        <div class="empty-state">
          <h3>No teachers yet</h3>
          <p>Click "Add New Teacher" to create one</p>
        </div>
      `;
    }

    // Close modal on outside click
    document.getElementById('teacherModal').addEventListener('click', (e) => {
      if (e.target.id === 'teacherModal') closeModal();
    });
  </script>
</body>
</html>
