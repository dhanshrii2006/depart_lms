<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses - Acadify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📚 Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="student-dashboard.html">Dashboard</a></li>
        <li><a href="my-courses.html" class="active">My Courses</a></li>
        <li><a href="browse-courses.html">Browse Courses</a></li>
        <li><a href="lesson.html">Lessons</a></li>
        <li><a href="quiz.html">Quizzes</a></li>
        <li><a href="progress.html">Progress</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>My Courses</h1>
        <div class="user-info">
          <span id="userName">Student</span>
          <div class="user-avatar" id="userAvatar">U</div>
        </div>
      </header>

      <div class="content">
        <div class="card" style="margin-bottom:2rem; border: 2px solid #667eea;">
          <h3 style="color:#667eea; margin-bottom:1rem;">Enroll in a Course</h3>
          <div style="display:flex; gap:1rem;">
            <input type="text" id="inviteCodeInput" 
              placeholder="Enter invite code e.g. REACT1" 
              style="flex:1; padding:12px; border:2px solid #667eea; 
              border-radius:8px; font-size:14px; font-family:inherit;">
            <button class="btn btn-primary" onclick="enrollCourse()">
              Enroll
            </button>
          </div>
          <div id="enrollMessage" style="margin-top:1rem; padding:12px; 
            border-radius:8px; display:none; font-weight:500;"></div>
        </div>

        <h2 style="margin-bottom:1.5rem;">My Enrolled Courses</h2>
        <div id="coursesList">
          <p style="color:#999;">Loading courses...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>
    checkAuth('student');
    document.getElementById('userName').textContent = getUserName();
    document.getElementById('userAvatar').textContent = getUserInitials();

    async function loadCourses() {
      const coursesList = document.getElementById('coursesList');
      try {
        const data = await enrollmentsAPI.myCourses();
        const courses = Array.isArray(data) ? data : (data.courses || []);
        
        if (courses.length === 0) {
          coursesList.innerHTML = 
            '<div style="text-align:center; padding:3rem; color:#666;">' +
            '<p style="font-size:18px; margin-bottom:1rem;">No courses yet</p>' +
            '<p>Ask your teacher for an invite code to enroll</p>' +
            '</div>';
          return;
        }

        let html = '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem;">';
        courses.forEach(function(course) {
          const pct = course.progress_pct || 0;
          const teacher = course.teacher_name || 'Unknown';
          html += '<div class="card">';
          html += '<div style="background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:1rem; border-radius:8px 8px 0 0; margin:-24px -24px 1rem -24px;">';
          html += '<h3 style="margin:0; color:white;">' + course.title + '</h3>';
          html += '</div>';
          html += '<p style="color:#666; font-size:14px; margin-bottom:1rem;">Teacher: ' + teacher + '</p>';
          html += '<div style="margin-bottom:1rem;">';
          html += '<div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">';
          html += '<span style="font-size:13px; color:#666;">Progress</span>';
          html += '<span style="font-size:13px; font-weight:600; color:#667eea;">' + pct + '%</span>';
          html += '</div>';
          html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
          html += '</div>';
          html += '<button class="btn btn-primary" style="width:100%;">Continue Learning</button>';
          html += '</div>';
        });
        html += '</div>';
        coursesList.innerHTML = html;

      } catch (error) {
        coursesList.innerHTML = 
          '<p style="color:#ef4444;">Error loading courses: ' + error.message + '</p>';
      }
    }

    async function enrollCourse() {
      const inviteCode = document.getElementById('inviteCodeInput').value.trim();
      const messageDiv = document.getElementById('enrollMessage');
      
      if (!inviteCode) {
        messageDiv.textContent = 'Please enter an invite code';
        messageDiv.style.background = '#fee2e2';
        messageDiv.style.color = '#991b1b';
        messageDiv.style.display = 'block';
        return;
      }

      try {
        await enrollmentsAPI.join(inviteCode);
        messageDiv.textContent = 'Successfully enrolled! Loading your courses...';
        messageDiv.style.background = '#d1fae5';
        messageDiv.style.color = '#065f46';
        messageDiv.style.display = 'block';
        document.getElementById('inviteCodeInput').value = '';
        setTimeout(function() {
          messageDiv.style.display = 'none';
          loadCourses();
        }, 2000);
      } catch (error) {
        messageDiv.textContent = 'Error: ' + error.message;
        messageDiv.style.background = '#fee2e2';
        messageDiv.style.color = '#991b1b';
        messageDiv.style.display = 'block';
      }
    }

    document.getElementById('inviteCodeInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') enrollCourse();
    });

    loadCourses();
  </script>
</body>
</html>
