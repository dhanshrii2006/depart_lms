<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Course - Acadify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .join-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .join-container h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .join-container p {
            color: #666;
            margin: 10px 0 30px 0;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success-message {
            color: #28a745;
            padding: 15px;
            background: #d4edda;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        
        .error-message {
            color: #dc3545;
            padding: 15px;
            background: #f8d7da;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .button-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="join-container">
        <div id="loading" class="loading">
            <h1>Joining Course...</h1>
            <div class="spinner"></div>
            <p>Please wait while we process your request.</p>
        </div>
        
        <div id="success" style="display: none;">
            <h1>✅ Success!</h1>
            <p id="successMessage"></p>
            <div class="success-message" style="display: block;">You have been successfully enrolled in the course!</div>
            <div class="button-group">
                <button class="btn-primary" onclick="goToDashboard()">Go to My Courses</button>
                <button class="btn-secondary" onclick="goHome()">Go Home</button>
            </div>
        </div>
        
        <div id="error" style="display: none;">
            <h1>❌ Error</h1>
            <div class="error-message" style="display: block;" id="errorMessage"></div>
            <div class="button-group">
                <button class="btn-secondary" onclick="goHome()">Go Home</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        async function joinCourseFromKey() {
            try {
                // Get auth status
                const user = await authAPI.me();
                
                // If user is not logged in, redirect to login
                if (!user || user.error) {
                    localStorage.setItem('redirectAfterLogin', window.location.href);
                    window.location.href = 'index.html?tab=login';
                    return;
                }
                
                // Get key from URL
                const params = new URLSearchParams(window.location.search);
                const key = params.get('key');
                
                if (!key) {
                    showError('No enrollment key provided in URL');
                    return;
                }
                
                // Join course with key
                const response = await enrollmentsAPI.join(key);
                
                if (response.error) {
                    showError(response.error);
                    return;
                }
                
                showSuccess('Successfully joined the course!');
            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('Invalid invite code')) {
                    showError('Invalid enrollment key. Please check the key and try again.');
                } else if (error.message.includes('not found')) {
                    showError('Course not found or you may have already enrolled.');
                } else {
                    showError('Error joining course: ' + error.message);
                }
            }
        }
        
        function showSuccess(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('successMessage').textContent = 'You are now enrolled in the course!';
        }
        
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }
        
        function goToDashboard() {
            window.location.href = 'student-dashboard.html';
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        // Auto-join when page loads
        window.addEventListener('DOMContentLoaded', () => {
            joinCourseFromKey();
        });
    </script>
</body>
</html>
