<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Management - Teacher</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .assessment-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #667eea;
    }

    .section-header h2 {
      color: white;
      margin: 0;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(102, 126, 234, 0.2);
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #a3aac4;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      border-bottom-color: #667eea;
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .courses-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .course-card {
      background: #1a202c;
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 0.8rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .course-card:hover {
      border-color: #667eea;
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
    }

    .course-title {
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .course-modules {
      color: #a3aac4;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .quiz-card {
      background: #1a202c;
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 0.8rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }

    .quiz-card:hover {
      border-color: #667eea;
    }

    .quiz-title {
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .quiz-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #a3aac4;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .quiz-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn-small {
      padding: 0.5rem 1rem;
      background: #667eea;
      border: none;
      border-radius: 0.4rem;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .btn-small:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #dc3545;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-secondary {
      background: #764ba2;
    }

    .btn-secondary:hover {
      background: #6a4194;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1a202c;
      border: 1px solid #667eea;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #667eea;
    }

    .modal-title {
      color: white;
      font-size: 1.3rem;
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: #a3aac4;
      cursor: pointer;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      color: white;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.75rem;
      background: #0f1419;
      border: 1px solid #667eea;
      border-radius: 0.4rem;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #764ba2;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
    }

    .question-item {
      background: #0f1419;
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .question-type {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .remove-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .option-input {
      margin-bottom: 0.5rem;
    }

    .option-input input {
      width: 100%;
      padding: 0.5rem;
      background: #1a202c;
      border: 1px solid rgba(102, 126, 234, 0.15);
      border-radius: 0.3rem;
      color: white;
      margin-top: 0.25rem;
    }

    .correct-answer-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(102, 126, 234, 0.2);
    }

    .quiz-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #1a202c;
      border: 1px solid #667eea;
      border-radius: 0.8rem;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #a3aac4;
      font-size: 0.9rem;
    }

    .ai-options {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid #667eea;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .toggle-group {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .toggle-btn {
      flex: 1;
      padding: 0.75rem;
      background: #0f1419;
      border: 2px solid #667eea;
      border-radius: 0.4rem;
      color: #667eea;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: #667eea;
      color: white;
    }

    .question-template {
      background: #0f1419;
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .question-template:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .template-title {
      color: white;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .template-type {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      background: #1a202c;
      border: 2px dashed #667eea;
      border-radius: 0.8rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      color: #667eea;
      margin-bottom: 1rem;
    }

    .empty-text {
      color: #a3aac4;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📚 Acadify Teacher</div>
      <ul class="sidebar-menu">
        <li><a href="teacher-dashboard.html"><i class="fas fa-chalkboard-teacher mr-2"></i> Dashboard</a></li>
        <li><a href="course-creation.html"><i class="fas fa-plus-circle mr-2"></i> Create Course</a></li>
        <li><a href="my-courses.html"><i class="fas fa-folder-open mr-2"></i> My Courses</a></li>
        <li><a href="assessment.html" class="active"><i class="fas fa-quiz mr-2"></i> Assessments</a></li>
        <li><a href="calendar.html"><i class="fas fa-calendar mr-2"></i> Calendar</a></li>
        <li><a href="settings.html"><i class="fas fa-cog mr-2"></i> Preferences</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>Assessment Management</h1>
        <div class="user-info">
          <span id="teacherName">Teacher</span>
          <div class="user-avatar" id="teacherAvatar">T</div>
        </div>
      </header>

      <div class="content">
        <div class="assessment-container">
          <div class="section-header">
            <h2>Create & Manage Quizzes</h2>
            <button class="btn-primary" onclick="openCourseSelection()">
              <i class="fas fa-plus"></i> New Quiz
            </button>
          </div>

          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all-quizzes')">All Quizzes</button>
            <button class="tab-btn" onclick="switchTab('question-bank')">Question Bank</button>
            <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
          </div>

          <!-- All Quizzes Tab -->
          <div id="all-quizzes" class="tab-content active">
            <div id="quizzesContainer"></div>
          </div>

          <!-- Question Bank Tab -->
          <div id="question-bank" class="tab-content">
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
              <button class="btn-primary" onclick="openQuestionBankModal()">
                <i class="fas fa-plus"></i> Add to Question Bank
              </button>
            </div>
            <div id="questionBankContainer"></div>
          </div>

          <!-- Analytics Tab -->
          <div id="analytics" class="tab-content">
            <div id="analyticsContainer"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Course Selection Modal -->
  <div class="modal" id="courseSelectionModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Select Course</h3>
        <button class="close-btn" onclick="closeCourseSelection()">&times;</button>
      </div>
      <div id="coursesList" class="courses-list"></div>
    </div>
  </div>

  <!-- Quiz Creation Modal -->
  <div class="modal" id="quizCreationModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Create New Quiz</h3>
        <button class="close-btn" onclick="closeQuizCreation()">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">Course: <span id="selectedCourseName" style="color: #667eea;"></span></label>
      </div>

      <div class="form-group">
        <label class="form-label">Module: <span id="selectedModuleName" style="color: #667eea;"></span></label>
      </div>

      <div class="form-group">
        <label class="form-label">Quiz Title</label>
        <input type="text" id="quizTitle" class="form-input" placeholder="e.g., Chapter 1 Assessment">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="quizDescription" placeholder="Quiz description"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Question Creation Method</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setQuestionMethod('manual')">Manual</button>
          <button class="toggle-btn" onclick="setQuestionMethod('ai')">AI Generated</button>
          <button class="toggle-btn" onclick="setQuestionMethod('bank')">From Question Bank</button>
        </div>
      </div>

      <!-- Manual Questions Section -->
      <div id="manualQuestionsSection">
        <div class="form-group">
          <label class="form-label">Time Limit (minutes, 0 = no limit)</label>
          <input type="number" id="timeLimit" class="form-input" value="30" min="0">
        </div>

        <div class="form-group">
          <label class="form-label">Passing Score (%)</label>
          <input type="number" id="passingScore" class="form-input" value="70" min="0" max="100">
        </div>

        <div class="form-group">
          <label class="form-label">Number of Questions</label>
          <input type="number" id="questionCount" class="form-input" value="5" min="1">
        </div>

        <div id="questionsContainer"></div>

        <button class="btn-secondary" onclick="addQuestion()" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-plus"></i> Add Question
        </button>
      </div>

      <!-- AI Generated Section -->
      <div id="aiGeneratedSection" style="display: none;">
        <div class="ai-options">
          <div class="form-group">
            <label class="form-label">Topic/Content Summary</label>
            <textarea class="form-textarea" id="aiTopic" placeholder="Summarize the content for which you want questions generated..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Number of Questions</label>
            <input type="number" id="aiQuestionCount" class="form-input" value="5" min="1" max="20">
          </div>

          <div class="form-group">
            <label class="form-label">Difficulty Level</label>
            <select id="aiDifficulty" class="form-select">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Question Types</label>
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
              <label style="color: #a3aac4;">
                <input type="checkbox" checked> Multiple Choice
              </label>
              <label style="color: #a3aac4;">
                <input type="checkbox" checked> True/False
              </label>
              <label style="color: #a3aac4;">
                <input type="checkbox"> Short Answer
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Time Limit (minutes, 0 = no limit)</label>
            <input type="number" id="aiTimeLimit" class="form-input" value="30" min="0">
          </div>

          <div class="form-group">
            <label class="form-label">Passing Score (%)</label>
            <input type="number" id="aiPassingScore" class="form-input" value="70" min="0" max="100">
          </div>

          <button class="btn-primary" onclick="generateAIQuestions()" style="width: 100%;">
            <i class="fas fa-wand-magic-sparkles"></i> Generate Questions
          </button>
        </div>
      </div>

      <!-- Question Bank Section -->
      <div id="questionBankSection" style="display: none;">
        <div id="bankQuestions" style="max-height: 400px; overflow-y: auto;"></div>
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button class="btn-primary" onclick="saveQuiz()" style="flex: 1;">
          <i class="fas fa-save"></i> Save Quiz
        </button>
        <button class="btn-secondary" onclick="closeQuizCreation()" style="flex: 1; background: #a3aac4;">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Question Bank Modal -->
  <div class="modal" id="questionBankModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Add Questions to Bank</h3>
        <button class="close-btn" onclick="closeQuestionBankModal()">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">Question Type</label>
        <select id="bankQType" class="form-select" onchange="updateBankQuestionForm()">
          <option value="multiple-choice">Multiple Choice</option>
          <option value="true-false">True/False</option>
          <option value="short-answer">Short Answer</option>
          <option value="fill-blank">Fill in the Blank</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Question</label>
        <textarea class="form-textarea" id="bankQuestion" placeholder="Enter your question here..."></textarea>
      </div>

      <div id="bankAnswerOptions"></div>

      <div class="correct-answer-section">
        <label class="form-label">Correct Answer(s)</label>
        <input type="text" id="bankCorrectAnswer" class="form-input" placeholder="Enter the correct answer">
      </div>

      <div class="form-group">
        <label class="form-label">Category/Topic</label>
        <input type="text" id="bankCategory" class="form-input" placeholder="e.g., Biology - Chapter 1">
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button class="btn-primary" onclick="saveBankQuestion()" style="flex: 1;">
          <i class="fas fa-save"></i> Add to Bank
        </button>
        <button class="btn-secondary" onclick="closeQuestionBankModal()" style="flex: 1; background: #a3aac4;">
          Close
        </button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    checkAuth('teacher');

    let currentCourse = null;
    let currentModule = null;
    let questionMethod = 'manual';
    let allQuestions = [];
    let bankQuestions = JSON.parse(localStorage.getItem('questionBank')) || [];

    document.getElementById('teacherName').textContent = getUserName();
    document.getElementById('teacherAvatar').textContent = getUserInitials();

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'question-bank') {
        loadQuestionBank();
      } else if (tabName === 'analytics') {
        loadAnalytics();
      } else {
        loadAllQuizzes();
      }
    }

    function openCourseSelection() {
      const courses = JSON.parse(localStorage.getItem('teacherCourses')) || [];
      const container = document.getElementById('coursesList');

      if (courses.length === 0) {
        container.innerHTML = '<p style="color: #a3aac4; grid-column: 1/-1; text-align: center;">No courses created yet</p>';
      } else {
        container.innerHTML = courses.map((course, idx) => `
          <div class="course-card" onclick="selectCourse(${idx})">
            <div class="course-title">${course.title}</div>
            <div class="course-modules"><i class="fas fa-layer-group"></i> ${course.modules.length} Modules</div>
            <div style="color: #667eea; cursor: pointer;" onclick="selectCourse(${idx}); event.stopPropagation();">
              Select Course →
            </div>
          </div>
        `).join('');
      }

      document.getElementById('courseSelectionModal').classList.add('show');
    }

    function closeCourseSelection() {
      document.getElementById('courseSelectionModal').classList.remove('show');
    }

    function selectCourse(courseIdx) {
      const courses = JSON.parse(localStorage.getItem('teacherCourses')) || [];
      currentCourse = courses[courseIdx];
      currentModule = null;
      closeCourseSelection();

      // Show module selection if multiple modules
      if (currentCourse.modules.length === 1) {
        selectModule(0);
      } else {
        showModuleSelection();
      }
    }

    function showModuleSelection() {
      const moduleList = currentCourse.modules.map((mod, idx) => `
        <div class="course-card" style="cursor: pointer;" onclick="selectModule(${idx})">
          <div class="course-title">${mod.moduleName}</div>
          <div class="course-modules">${mod.lessons.length} Lessons</div>
        </div>
      `).join('');

      document.getElementById('coursesList').innerHTML = moduleList;
      document.getElementById('courseSelectionModal').classList.add('show');
    }

    function selectModule(moduleIdx) {
      currentModule = currentCourse.modules[moduleIdx];
      closeCourseSelection();
      openQuizCreation();
    }

    function openQuizCreation() {
      document.getElementById('selectedCourseName').textContent = currentCourse.title;
      document.getElementById('selectedModuleName').textContent = currentModule.moduleName;
      document.getElementById('quizCreationModal').classList.add('show');
      allQuestions = [];
      renderQuestions();
    }

    function closeQuizCreation() {
      document.getElementById('quizCreationModal').classList.remove('show');
      allQuestions = [];
    }

    function setQuestionMethod(method) {
      questionMethod = method;
      document.querySelectorAll('[onclick*="setQuestionMethod"]').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('manualQuestionsSection').style.display = method === 'manual' ? 'block' : 'none';
      document.getElementById('aiGeneratedSection').style.display = method === 'ai' ? 'block' : 'none';
      document.getElementById('questionBankSection').style.display = method === 'bank' ? 'block' : 'none';

      if (method === 'bank') {
        loadBankQuestionsForQuiz();
      }
    }

    function addQuestion() {
      allQuestions.push({
        type: 'multiple-choice',
        question: '',
        options: ['', '', '', ''],
        correctAnswer: 0
      });
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      if (allQuestions.length === 0) {
        container.innerHTML = '<p style="color: #a3aac4; text-align: center;">No questions added yet</p>';
        return;
      }

      container.innerHTML = allQuestions.map((q, idx) => `
        <div class="question-item">
          <div class="question-header">
            <div>
              <span class="question-type">${q.type.replace('-', ' ').toUpperCase()}</span>
            </div>
            <button class="remove-btn" onclick="removeQuestion(${idx})">Remove</button>
          </div>

          <label class="form-label">Question ${idx + 1}</label>
          <textarea class="form-textarea" onchange="updateQuestion(${idx}, 'question', this.value)" placeholder="Enter question">${q.question}</textarea>

          <div style="margin-top: 1rem;">
            <label class="form-label">Question Type</label>
            <select class="form-select" onchange="updateQuestion(${idx}, 'type', this.value)">
              <option value="multiple-choice" ${q.type === 'multiple-choice' ? 'selected' : ''}>Multiple Choice</option>
              <option value="true-false" ${q.type === 'true-false' ? 'selected' : ''}>True/False</option>
              <option value="short-answer" ${q.type === 'short-answer' ? 'selected' : ''}>Short Answer</option>
              <option value="fill-blank" ${q.type === 'fill-blank' ? 'selected' : ''}>Fill in the Blank</option>
            </select>
          </div>

          ${q.type === 'multiple-choice' ? renderMCOptions(idx, q) : ''}
          ${q.type === 'true-false' ? renderTFOptions(idx, q) : ''}
        </div>
      `).join('');
    }

    function renderMCOptions(idx, q) {
      return `
        <div style="margin-top: 1rem;">
          <label class="form-label">Options</label>
          ${q.options.map((opt, optIdx) => `
            <div class="option-input">
              <input type="text" value="${opt}" onchange="updateQuestion(${idx}, 'options', ${optIdx}, this.value)" placeholder="Option ${optIdx + 1}">
              <label style="color: #a3aac4; margin-top: 0.5rem;">
                <input type="radio" name="correct-${idx}" ${q.correctAnswer === optIdx ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correctAnswer', ${optIdx})">
                Correct Answer
              </label>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTFOptions(idx, q) {
      return `
        <div style="margin-top: 1rem;">
          <label style="color: #a3aac4; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <input type="radio" name="correct-${idx}" ${q.correctAnswer === true ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correctAnswer', true)">
            True
          </label>
          <label style="color: #a3aac4; display: flex; align-items: center; gap: 1rem;">
            <input type="radio" name="correct-${idx}" ${q.correctAnswer === false ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correctAnswer', false)">
            False
          </label>
        </div>
      `;
    }

    function updateQuestion(idx, field, ...args) {
      if (field === 'options') {
        allQuestions[idx].options[args[0]] = args[1];
      } else if (field === 'correctAnswer') {
        allQuestions[idx].correctAnswer = args[0];
      } else {
        allQuestions[idx][field] = args[0];
      }
      renderQuestions();
    }

    function removeQuestion(idx) {
      allQuestions.splice(idx, 1);
      renderQuestions();
    }

    function generateAIQuestions() {
      const topic = document.getElementById('aiTopic').value;
      const count = parseInt(document.getElementById('aiQuestionCount').value) || 5;
      const difficulty = document.getElementById('aiDifficulty').value;

      if (!topic.trim()) {
        alert('Please provide topic/content summary');
        return;
      }

      // Simulate AI-generated questions
      const templates = {
        'multiple-choice': [
          { q: 'What is the PRIMARY concept of {{topic}}?', opts: ['Option A', 'Option B', 'Option C', 'Option D'] },
          { q: 'Which statement about {{topic}} is correct?', opts: ['Statement 1', 'Statement 2', 'Statement 3', 'Statement 4'] },
          { q: 'How does {{topic}} relate to practical applications?', opts: ['Application A', 'Application B', 'Application C', 'Application D'] }
        ],
        'true-false': [
          { q: '{{topic}} is a fundamental concept in this field.' },
          { q: '{{topic}} has limited real-world applications.' },
          { q: 'Understanding {{topic}} requires advanced knowledge.' }
        ]
      };

      allQuestions = [];
      for (let i = 0; i < count; i++) {
        const type = i % 2 === 0 ? 'multiple-choice' : 'true-false';
        const template = templates[type][Math.floor(Math.random() * templates[type].length)];
        const question = template.q.replace('{{topic}}', topic);

        if (type === 'multiple-choice') {
          allQuestions.push({
            type: 'multiple-choice',
            question: question,
            options: template.opts,
            correctAnswer: Math.floor(Math.random() * 4)
          });
        } else {
          allQuestions.push({
            type: 'true-false',
            question: question,
            options: ['True', 'False'],
            correctAnswer: Math.random() > 0.5
          });
        }
      }

      renderQuestions();
      alert(`Generated ${count} AI questions. Review and customize as needed.`);
    }

    function loadBankQuestionsForQuiz() {
      const container = document.getElementById('bankQuestions');
      if (bankQuestions.length === 0) {
        container.innerHTML = '<p style="color: #a3aac4; text-align: center;">No questions in bank yet</p>';
        return;
      }

      container.innerHTML = bankQuestions.map((q, idx) => `
        <div class="question-template">
          <div class="template-type">${q.type.replace('-', ' ').toUpperCase()}</div>
          <div class="template-title">${q.question.substring(0, 60)}...</div>
          <div style="color: #a3aac4; font-size: 0.85rem; margin-top: 0.5rem;">${q.category}</div>
          <button class="btn-small" onclick="addBankQuestionToQuiz(${idx})" style="width: 100%; margin-top: 0.5rem;">Add to Quiz</button>
        </div>
      `).join('');
    }

    function addBankQuestionToQuiz(idx) {
      const q = bankQuestions[idx];
      allQuestions.push({...q});
      renderQuestions();
      alert('Question added to quiz!');
    }

    function saveQuiz() {
      const title = document.getElementById('quizTitle').value;
      const description = document.getElementById('quizDescription').value;

      if (!title) {
        alert('Please enter quiz title');
        return;
      }

      if (questionMethod === 'manual' && allQuestions.length === 0) {
        alert('Please add at least one question');
        return;
      }

      const quiz = {
        id: 'quiz_' + Date.now(),
        courseId: currentCourse.id,
        moduleId: currentModule.id || 0,
        title: title,
        description: description,
        questions: allQuestions,
        timeLimit: parseInt(document.getElementById('timeLimit').value) || 0,
        passingScore: parseInt(document.getElementById('passingScore').value) || 70,
        createdAt: new Date().toISOString(),
        attempts: []
      };

      let quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      quizzes.push(quiz);
      localStorage.setItem('teacherQuizzes', JSON.stringify(quizzes));

      closeQuizCreation();
      loadAllQuizzes();
      alert('Quiz created successfully!');
    }

    function loadAllQuizzes() {
      const quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      const container = document.getElementById('quizzesContainer');

      if (quizzes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-inbox"></i></div>
            <div class="empty-text">No quizzes created yet</div>
            <button class="btn-primary" onclick="openCourseSelection()">Create Your First Quiz</button>
          </div>
        `;
        return;
      }

      container.innerHTML = quizzes.map((quiz, idx) => {
        const attempts = quiz.attempts || [];
        const avgScore = attempts.length > 0 ? (attempts.reduce((s, a) => s + a.score, 0) / attempts.length).toFixed(1) : 'N/A';

        return `
          <div class="quiz-card">
            <div class="quiz-title">${quiz.title}</div>
            <div class="quiz-meta">
              <div class="meta-item"><i class="fas fa-questions"></i> ${quiz.questions.length} Questions</div>
              <div class="meta-item"><i class="fas fa-clock"></i> ${quiz.timeLimit}m</div>
              <div class="meta-item"><i class="fas fa-users"></i> ${attempts.length} Attempts</div>
              <div class="meta-item"><i class="fas fa-chart-line"></i> Avg: ${avgScore}%</div>
            </div>
            <p style="color: #a3aac4; font-size: 0.9rem; margin-top: 0.75rem;">${quiz.description || 'No description'}</p>
            <div class="quiz-actions">
              <button class="btn-small" onclick="editQuiz(${idx})"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-small btn-secondary" onclick="viewQuizResults(${idx})"><i class="fas fa-chart-bar"></i> Results</button>
              <button class="btn-small btn-danger" onclick="deleteQuiz(${idx})"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function editQuiz(idx) {
      alert('Edit functionality coming soon!');
    }

    function deleteQuiz(idx) {
      if (confirm('Are you sure you want to delete this quiz?')) {
        let quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
        quizzes.splice(idx, 1);
        localStorage.setItem('teacherQuizzes', JSON.stringify(quizzes));
        loadAllQuizzes();
      }
    }

    function viewQuizResults(idx) {
      const quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      const quiz = quizzes[idx];
      const attempts = quiz.attempts || [];

      if (attempts.length === 0) {
        alert('No student attempts yet');
        return;
      }

      let resultsHtml = `Quiz: ${quiz.title}\n\n`;
      attempts.forEach(attempt => {
        resultsHtml += `${attempt.studentName}: ${attempt.score}% (${new Date(attempt.attemptTime).toLocaleString()})\n`;
      });

      alert(resultsHtml);
    }

    function openQuestionBankModal() {
      document.getElementById('questionBankModal').classList.add('show');
      updateBankQuestionForm();
    }

    function closeQuestionBankModal() {
      document.getElementById('questionBankModal').classList.remove('show');
    }

    function updateBankQuestionForm() {
      const type = document.getElementById('bankQType').value;
      const container = document.getElementById('bankAnswerOptions');

      if (type === 'multiple-choice') {
        container.innerHTML = `
          <label class="form-label">Options</label>
          <div class="option-input">
            <input type="text" id="bankOpt0" placeholder="Option 1">
          </div>
          <div class="option-input">
            <input type="text" id="bankOpt1" placeholder="Option 2">
          </div>
          <div class="option-input">
            <input type="text" id="bankOpt2" placeholder="Option 3">
          </div>
          <div class="option-input">
            <input type="text" id="bankOpt3" placeholder="Option 4">
          </div>
        `;
      } else if (type === 'true-false') {
        container.innerHTML = '';
      }
    }

    function saveBankQuestion() {
      const type = document.getElementById('bankQType').value;
      const question = document.getElementById('bankQuestion').value;
      const category = document.getElementById('bankCategory').value;
      const correctAnswer = document.getElementById('bankCorrectAnswer').value;

      if (!question || !correctAnswer) {
        alert('Please fill in all required fields');
        return;
      }

      const bankQuestion = {
        id: 'bq_' + Date.now(),
        type: type,
        question: question,
        category: category,
        correctAnswer: correctAnswer
      };

      if (type === 'multiple-choice') {
        bankQuestion.options = [
          document.getElementById('bankOpt0').value,
          document.getElementById('bankOpt1').value,
          document.getElementById('bankOpt2').value,
          document.getElementById('bankOpt3').value
        ];
      }

      bankQuestions.push(bankQuestion);
      localStorage.setItem('questionBank', JSON.stringify(bankQuestions));

      document.getElementById('bankQuestion').value = '';
      document.getElementById('bankCorrectAnswer').value = '';
      document.getElementById('bankCategory').value = '';

      loadQuestionBank();
      alert('Question added to bank!');
    }

    function loadQuestionBank() {
      const container = document.getElementById('questionBankContainer');

      if (bankQuestions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-book"></i></div>
            <div class="empty-text">No questions in bank yet</div>
          </div>
        `;
        return;
      }

      container.innerHTML = bankQuestions.map((q, idx) => `
        <div class="question-template">
          <div class="template-type">${q.type.replace('-', ' ').toUpperCase()}</div>
          <div class="template-title">${q.question.substring(0, 70)}...</div>
          <div style="color: #a3aac4; font-size: 0.85rem; margin-top: 0.5rem;"><i class="fas fa-tag"></i> ${q.category}</div>
          <button class="btn-small btn-danger" onclick="deleteBankQuestion(${idx})" style="width: 100%; margin-top: 0.5rem;">Remove</button>
        </div>
      `).join('');
    }

    function deleteBankQuestion(idx) {
      if (confirm('Remove from question bank?')) {
        bankQuestions.splice(idx, 1);
        localStorage.setItem('questionBank', JSON.stringify(bankQuestions));
        loadQuestionBank();
      }
    }

    function loadAnalytics() {
      const quizzes = JSON.parse(localStorage.getItem('teacherQuizzes')) || [];
      const container = document.getElementById('analyticsContainer');

      if (quizzes.length === 0) {
        container.innerHTML = '<p style="color: #a3aac4; text-align: center;">No quiz data yet</p>';
        return;
      }

      let totalAttempts = 0;
      let totalScore = 0;

      const stats = quizzes.map(quiz => {
        const attempts = quiz.attempts || [];
        totalAttempts += attempts.length;
        const avgScore = attempts.length > 0 ? (attempts.reduce((s, a) => s + a.score, 0) / attempts.length).toFixed(1) : 0;
        totalScore += parseFloat(avgScore);

        return `
          <div class="stat-card">
            <div style="text-align: left; margin-bottom: 1rem;">
              <div style="color: white; font-weight: 600; margin-bottom: 0.5rem;">${quiz.title}</div>
              <div style="font-size: 0.85rem; color: #a3aac4;">${quiz.questions.length} Questions</div>
            </div>
            <div class="stat-value">${avgScore}%</div>
            <div class="stat-label">${attempts.length} Student Attempts</div>
          </div>
        `;
      }).join('');

      const avgOverall = quizzes.length > 0 ? (totalScore / quizzes.length).toFixed(1) : 0;

      container.innerHTML = `
        <div class="quiz-stats">
          <div class="stat-card">
            <div class="stat-value">${quizzes.length}</div>
            <div class="stat-label">Total Quizzes</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totalAttempts}</div>
            <div class="stat-label">Total Attempts</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${avgOverall}%</div>
            <div class="stat-label">Average Score</div>
          </div>
        </div>
        <div style="margin-top: 2rem; font-size: 1.1rem; font-weight: 600; color: white; margin-bottom: 1rem;">Quiz Performance</div>
        <div class="quiz-stats">
          ${stats}
        </div>
      `;
    }

    loadAllQuizzes();
  </script>
</body>
</html>
