<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses - Acadify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📚 Acadify</div>
      <ul class="sidebar-menu">
        <li><a href="student-dashboard.html">Dashboard</a></li>
        <li><a href="my-courses.html" class="active">My Courses</a></li>
        <li><a href="browse-courses.html">Browse Courses</a></li>
        <li><a href="lesson.html">Lessons</a></li>
        <li><a href="quiz.html">Quizzes</a></li>
        <li><a href="#">Assignments</a></li>
        <li><a href="progress.html">Progress</a></li>
        <li><a href="#">Calendar</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>My Courses</h1>
        <div class="user-info">
          <span id="userName">Student</span>
          <div class="user-avatar" id="userAvatar">U</div>
        </div>
      </header>

      <div class="content">
        <div class="card" style="margin-bottom: 2rem; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); border: 2px solid #667eea;">
          <h3 style="color: #0369a1; margin-bottom: 1rem;">📝 Enroll in a Course</h3>
          <div style="display: flex; gap: 1rem;">
            <input type="text" id="inviteCodeInput" placeholder="Enter invite code e.g. A3F9QZ" style="flex: 1; padding: 12px; border: 2px solid #667eea; border-radius: 8px; font-size: 14px;">
            <button class="btn btn-primary" onclick="enrollCourse()">Enroll</button>
          </div>
          <div id="enrollMessage" style="margin-top: 1rem; padding: 12px; border-radius: 8px; display: none; font-weight: 500;"></div>
        </div>

        <h2 style="margin-bottom: 1.5rem; font-size: 22px;">My Courses</h2>
        <div id="coursesList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
          <p style="color: #999;">Loading courses...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></ script>
  <script src="api.js"></ script>
  <script>
    checkAuth('student');
    document.getElementById('userName').textContent = getUserName();
    document.getElementById('userAvatar').textContent = getUserInitials();

    async function loadCourses() {
      try {
        const response = await enrollmentsAPI.myCourses();
        const coursesList = document.getElementById('coursesList');
        if (!response.courses || response.courses.length === 0) {
          coursesList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;"><p style="font-size: 16px; color: #666; margin-bottom: 1rem;">You haven'\''t enrolled in any courses yet</p><p style="font-size: 14px; color: #999;">Ask your teacher for an invite code</p></div>';
          return;
        }
        coursesList.innerHTML = response.courses.map(course => <div class="card" style="display: flex; flex-direction: column;"><div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem; border-radius: 8px 8px 0 0; margin: -24px -24px 1rem -24px;"><h3 style="margin: 0; color: white;">\</h3></div><p style="color: #666; font-size: 14px; margin-bottom: 1rem;">Teacher: \</p><div style="margin-bottom: 1rem;"><div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;"><span style="font-size: 13px; color: #666;">Progress</span><span style="font-size: 13px; font-weight: 600; color: #667eea;">\%</span></div><div class="progress-bar"><div class="progress-fill" style="width: \%"></div></div></div><button class="btn btn-primary" style="width: 100%; margin-top: auto;">Continue Learning →</button></div>).join('');
      } catch (error) {
        console.error('Error loading courses:', error);
        document.getElementById('coursesList').innerHTML = '<div style="grid-column: 1/-1; color: #ef4444;"><p>Error: ' + error.message + '</p></div>';
      }
    }

    async function enrollCourse() {
      const inviteCode = document.getElementById('inviteCodeInput').value.trim();
      const messageDiv = document.getElementById('enrollMessage');
      if (!inviteCode) {
        messageDiv.textContent = '❌ Please enter an invite code';
        messageDiv.style.background = '#fee2e2';
        messageDiv.style.color = '#991b1b';
        messageDiv.style.display = 'block';
        return;
      }
      try {
        await enrollmentsAPI.join(inviteCode);
        messageDiv.textContent = '✅ Successfully enrolled! Refreshing...';
        messageDiv.style.background = '#d1fae5';
        messageDiv.style.color = '#065f46';
        messageDiv.style.display = 'block';
        document.getElementById('inviteCodeInput').value = '';
        setTimeout(() => {
          messageDiv.style.display = 'none';
          loadCourses();
        }, 2000);
      } catch (error) {
        messageDiv.textContent = '❌ ' + error.message;
        messageDiv.style.background = '#fee2e2';
        messageDiv.style.color = '#991b1b';
        messageDiv.style.display = 'block';
      }
    }

    document.getElementById('inviteCodeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') enrollCourse();
    });

    loadCourses();
  </script>
</body>
</html>
