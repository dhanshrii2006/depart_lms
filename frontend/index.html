<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">        
  <title>Acadify | Professional LMS Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-container">
  <div class="login-card glass-card">
    <div class="login-header">
      <h1>Acadify</h1>
      <p class="text-muted">High-Fidelity Learning Environment</p>
    </div>

    <div id="errorMessage" class="mb-4" style="color: var(--error); border-radius: 0.5rem; display: none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@acadify.dev" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="•••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
        <span id="buttonText">Continue to Platform</span>
      </button>
    </form>

    <div class="mt-4 text-center">     
      <p class="mb-3" style="font-size: 0.9rem;"><strong>Quick Access Dashboards</strong></p>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <button class="btn btn-primary" style="padding: 0.75rem; font-size: 0.9rem;" onclick="directAccess('student')">
          <i class="fas fa-user-graduate"></i> Student
        </button>
        <button class="btn btn-primary" style="padding: 0.75rem; font-size: 0.9rem;" onclick="directAccess('teacher')">
          <i class="fas fa-chalkboard-user"></i> Teacher
        </button>
        <button class="btn btn-primary" style="padding: 0.75rem; font-size: 0.9rem;" onclick="directAccess('admin')">
          <i class="fas fa-shield-halved"></i> Admin
        </button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    function directAccess(role) {
      const credentials = {
        student: { email: 'student@acadify.dev', password: 'password123' },
        teacher: { email: 'teacher@acadify.dev', password: 'password123' },
        admin: { email: 'admin@acadify.dev', password: 'password123' }
      };
      const { email, password } = credentials[role];
      login(email, password);
    }

    async function login(email, password) {
      const errorDiv = document.getElementById('errorMessage');
      const submitBtn = document.querySelector('button[type="submit"]');
      const buttonText = document.getElementById('buttonText');
      errorDiv.style.display = 'none';
      submitBtn.disabled = true;
      buttonText.textContent = 'Verifying...';
      try {
        const response = await authAPI.login(email, password);
        localStorage.setItem('userId', response.user.id);
        localStorage.setItem('userName', response.user.name);
        localStorage.setItem('userEmail', response.user.email);
        localStorage.setItem('userRole', response.user.role);
        if (response.token) localStorage.setItem('authToken', response.token);  
        const roleRedirect = {
          'student': 'student-dashboard.html',
          'teacher': 'teacher-dashboard.html',
          'admin': 'admin-dashboard.html'
        };
        window.location.href = roleRedirect[response.user.role] || 'student-dashboard.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        buttonText.textContent = 'Continue to Platform';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      login(email, password);
    });
  </script>
</body>
</html>
